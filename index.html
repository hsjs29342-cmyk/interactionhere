<!DOCTYPE html>
<html>
<head>
    <title>Geeta Connect - Student Video Chat</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
</head>
<body>

<h2>Geeta Connect - Video & Chat Platform</h2>

<div class="join-section">
    <input id="username" placeholder="Enter your name">
    <input id="room" placeholder="Enter room name (e.g. BBA2026)">
    <button onclick="joinRoom()">Join Room</button>
</div>

<div class="video-section">
    <video id="localVideo" autoplay muted></video>
    <video id="remoteVideo" autoplay></video>
</div>

<div class="chat-section">
    <div id="messages"></div>
    <input id="chatInput" placeholder="Type message...">
    <button onclick="sendMessage()">Send</button>
</div>

<script>
const socket = io();
let room;
let localStream;
let peerConnection;

const servers = {
    iceServers: [
        { urls: "stun:stun.l.google.com:19302" }
    ]
};

async function joinRoom() {
    const username = document.getElementById("username").value;
    room = document.getElementById("room").value;

    socket.emit('join', {username: username, room: room});

    localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
    document.getElementById("localVideo").srcObject = localStream;

    peerConnection = new RTCPeerConnection(servers);

    localStream.getTracks().forEach(track => {
        peerConnection.addTrack(track, localStream);
    });

    peerConnection.ontrack = event => {
        document.getElementById("remoteVideo").srcObject = event.streams[0];
    };
}

function sendMessage() {
    const msg = document.getElementById("chatInput").value;
    socket.emit("message", {room: room, msg: msg});
    document.getElementById("chatInput").value = "";
}

socket.on("message", function(data) {
    document.getElementById("messages").innerHTML += "<p>" + JSON.stringify(data) + "</p>";
});
</script>

</body>
</html>
