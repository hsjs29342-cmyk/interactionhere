<!DOCTYPE html>
<html>
<head>
<title>DV Villain - Video Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
/* RESET & GLOBAL */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', Arial, sans-serif;
}

body{
    color:white;
    background-color: #000;
    scroll-behavior:smooth;
    overflow-x:hidden;
}

/* BACKGROUND VIDEO */
.bg-video{
    position:fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100dvh; 
    object-fit: cover;
    z-index: -3;
    filter: brightness(35%);
    transform: translate3d(0,0,0);
}

/* NAVIGATION (LOGO TOP, MENU BELOW ON MOBILE) */
nav {
    display: flex;
    justify-content: space-between; 
    align-items: center;
    padding: 15px 60px;
    background: #000; 
    position: fixed;
    width: 100%;
    top: 0;
    z-index: 1000;
    border-bottom: 2px solid red;
}

.logo {
    display: flex;
    align-items: center;
    gap: 12px;
}

.logo img {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    border: 2px solid red;
    box-shadow: 0 0 10px red;
}

.logo span {
    color: red;
    font-weight: 800;
    font-size: 22px;
    text-transform: uppercase;
}

.menu {
    display: flex;
    gap: 20px;
    list-style: none;
}

.menu li a {
    text-decoration: none;
    color: white;
    font-weight: 700;
    font-size: 18px; /* High visibility Header Buttons */
    transition: 0.3s;
    white-space: nowrap;
}

.menu li a:hover {
    color: red;
    text-shadow: 0 0 10px red;
}

/* SECTIONS */
section {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 180px 20px 80px 20px; 
    border-bottom: 1px solid rgba(255,0,0,0.1);
}

/* SUB-BUTTONS (SMALLER) */
.btn {
    display: inline-block;
    margin: 8px;
    padding: 10px 20px;
    background: red;
    color: white;
    text-decoration: none;
    border-radius: 5px;
    font-weight: 700;
    font-size: 13px; /* Small Sub-button size */
    text-transform: uppercase;
    transition: 0.3s;
    border: none;
}

/* VIDEO GRID - 10 SLOTS */
.video-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 20px;
    width: 100%;
    max-width: 1300px;
    margin-top: 40px;
}

.video-card {
    position: relative;
    background: #111;
    border: 1px solid #333;
    border-radius: 8px;
    overflow: hidden;
    transition: transform 0.3s, border-color 0.3s;
}

.video-card:hover {
    transform: translateY(-5px);
    border-color: red;
}

/* Responsive Iframe Container */
.iframe-container {
    position: relative;
    width: 100%;
    padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
    height: 0;
}

.iframe-container iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: 0;
}

/* MOBILE FIXES */
@media (max-width: 768px) {
    nav {
        flex-direction: column;
        padding: 15px 5px;
        gap: 12px;
    }

    .menu {
        width: 100%;
        justify-content: center;
        gap: 15px;
    }

    .menu li a {
        font-size: 14px; /* Balanced mobile header size */
    }

    .video-grid {
        grid-template-columns: 1fr; /* Single column on phones for better video width */
        gap: 15px;
    }
    
    section {
        padding-top: 150px;
    }
}
</style>
</head>

<body>

<video autoplay muted loop playsinline webkit-playsinline class="bg-video">
    <source src="https://giffiles.alphacoders.com/219/thumb-440-219892.mp4" type="video/mp4">
</video>

<nav>
    <div class="logo">
        <img src="https://i.imgur.com/7k12EPD.png">
        <span>DV Villain</span>
    </div>
    <ul class="menu">
        <li><a href="#home">Home</a></li>
        <li><a href="#videos">Videos</a></li>
        <li><a href="#community">Join</a></li>
        <li><a href="#comments">Feedback</a></li>
    </ul>
</nav>

<section id="home">
    <h1 style="font-size: 3rem; color: red;">DV VILLAIN</h1>
    <p style="margin-bottom: 20px; font-weight: 300;">THE ULTIMATE GAMING EXPERIENCE</p>
    <div class="btn-container">
        <a href="#videos" class="btn">Watch Now</a>
        <a href="#" class="btn" style="background: transparent; border: 1px solid red;">Subscribe</a>
    </div>
</section>

<section id="videos">
    <h2 style="color: red; text-transform: uppercase; letter-spacing: 2px;">Latest Content</h2>
    <div class="video-grid">
        <div class="video-card"><div class="iframe-container"><iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ?rel=0" allowfullscreen></iframe></div></div>
        <div class="video-card"><div class="iframe-container"><iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ?rel=0" allowfullscreen></iframe></div></div>
        <div class="video-card"><div class="iframe-container"><iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ?rel=0" allowfullscreen></iframe></div></div>
        <div class="video-card"><div class="iframe-container"><iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ?rel=0" allowfullscreen></iframe></div></div>
        <div class="video-card"><div class="iframe-container"><iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ?rel=0" allowfullscreen></iframe></div></div>
        <div class="video-card"><div class="iframe-container"><iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ?rel=0" allowfullscreen></iframe></div></div>
        <div class="video-card"><div class="iframe-container"><iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ?rel=0" allowfullscreen></iframe></div></div>
        <div class="video-card"><div class="iframe-container"><iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ?rel=0" allowfullscreen></iframe></div></div>
        <div class="video-card"><div class="iframe-container"><iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ?rel=0" allowfullscreen></iframe></div></div>
        <div class="video-card"><div class="iframe-container"><iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ?rel=0" allowfullscreen></iframe></div></div>
    </div>
</section>

<section id="comments">
    <h2>COMMUNITY FEEDBACK</h2>
    <div style="width: 100%; max-width: 600px; margin-top: 20px;">
        <textarea id="commentInput" rows="4" placeholder="Type your message..." style="width:100%; padding:15px; border-radius:8px; background:#111; color:white; border:1px solid #444; resize:none;"></textarea>
        <button class="btn" onclick="addComment()" style="width:100%; margin-top: 10px;">Post Comment</button>
    </div>
    <div id="comments-list" style="width: 100%; max-width: 600px; margin-top: 20px;"></div>
</section>

<script>
    function addComment(){
        let input = document.getElementById("commentInput");
        let text = input.value.trim();
        if(text === "") return;
        let div = document.createElement("div");
        div.style.background = "rgba(255,0,0,0.05)";
        div.style.padding = "15px";
        div.style.marginBottom = "10px";
        div.style.borderLeft = "4px solid red";
        div.style.borderRadius = "4px";
        div.innerText = text;
        document.getElementById("comments-list").prepend(div);
        input.value = "";
    }
</script>

</body>
</html>
