<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DV VILLAIN YT</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
scroll-behavior:smooth;
}

body{
background:black;
color:white;
overflow-x:hidden;
}

/* VIDEO BACKGROUND */
.bg-video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-3;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
z-index:-2;
}

/* NAVBAR */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 50px;
background:rgba(0,0,0,0.9);
position:fixed;
width:100%;
z-index:1000;
border-bottom:1px solid red;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
width:45px;
height:45px;
border-radius:50%;
border:2px solid red;
}

.logo span{
font-weight:800;
font-size:18px;
color:red;
}

.menu{
display:flex;
gap:20px;
list-style:none;
white-space:nowrap;
}

.menu li a{
text-decoration:none;
color:white;
font-weight:600;
font-size:14px;
}

.menu li a:hover{
color:red;
}

/* MOBILE */
@media(max-width:768px){
nav{
flex-direction:column;
align-items:center;
}
.menu{
margin-top:10px;
justify-content:center;
}
}

/* SECTIONS */
section{
min-height:100vh;
padding:160px 10% 80px;
text-align:center;
}

section h2{
color:red;
margin-bottom:20px;
}

/* BUTTON */
.btn{
padding:10px 20px;
background:red;
color:white;
border:none;
border-radius:20px;
cursor:pointer;
margin:10px;
}

.btn:hover{
box-shadow:0 0 15px red;
}

/* VIDEO GRID */
.video-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
margin-top:30px;
}

iframe{
width:100%;
height:200px;
border-radius:10px;
}

/* COMMENT BOX */
form{
max-width:400px;
margin:auto;
display:flex;
flex-direction:column;
gap:15px;
}

input, textarea{
padding:10px;
border-radius:6px;
border:1px solid red;
background:black;
color:white;
}

textarea{
height:100px;
resize:none;
}

.comment-list{
margin-top:40px;
max-width:600px;
margin-left:auto;
margin-right:auto;
text-align:left;
}

.comment{
background:rgba(255,0,0,0.1);
padding:10px;
margin-bottom:10px;
border-left:3px solid red;
border-radius:5px;
}

footer{
padding:20px;
text-align:center;
background:black;
color:#aaa;
}

</style>
</head>

<body>

<nav>
<div class="logo">
<img src="logo.png">
<span>DV VILLAIN YT</span>
</div>

<ul class="menu">
<li><a href="#home">Home</a></li>
<li><a href="#videos">Videos</a></li>
<li><a href="#comments">Comments</a></li>
</ul>
</nav>

<!-- HOME -->
<section id="home">
<h2>WELCOME TO DV VILLAIN YT</h2>
<p>Gaming • Entertainment • Power Content</p>

<button class="btn" onclick="window.open('https://www.youtube.com/@DV_VILLAIN_YT?sub_confirmation=1')">Subscribe</button>
<button class="btn" onclick="window.open('https://instagram.com/YOUR_INSTAGRAM')">Follow Instagram</button>
</section>

<!-- VIDEOS -->
<section id="videos">
<h2>Watch My Videos</h2>

<div class="video-grid">

<!-- Replace VIDEO_ID with real YouTube IDs -->

<iframe src="https://www.youtube.com/embed/VIDEO_ID1" allowfullscreen></iframe>
<iframe src="https://www.youtube.com/embed/VIDEO_ID2" allowfullscreen></iframe>
<iframe src="https://www.youtube.com/embed/VIDEO_ID3" allowfullscreen></iframe>
<iframe src="https://www.youtube.com/embed/VIDEO_ID4" allowfullscreen></iframe>
<iframe src="https://www.youtube.com/embed/VIDEO_ID5" allowfullscreen></iframe>
<iframe src="https://www.youtube.com/embed/VIDEO_ID6" allowfullscreen></iframe>
<iframe src="https://www.youtube.com/embed/VIDEO_ID7" allowfullscreen></iframe>
<iframe src="https://www.youtube.com/embed/VIDEO_ID8" allowfullscreen></iframe>
<iframe src="https://www.youtube.com/embed/VIDEO_ID9" allowfullscreen></iframe>
<iframe src="https://www.youtube.com/embed/VIDEO_ID10" allowfullscreen></iframe>

</div>
</section>

<!-- COMMENTS -->
<section id="comments">
<h2>Comments & Feedback</h2>

<form id="commentForm">
<input type="text" id="name" placeholder="Your Name" required>
<textarea id="message" placeholder="Your Comment..." required></textarea>
<button type="submit" class="btn">Post Comment</button>
</form>

<div class="comment-list" id="commentList"></div>

</section>

<footer>
© 2026 DV VILLAIN YT
</footer>

<script>

/* Load Comments */
document.addEventListener("DOMContentLoaded", function(){
loadComments();
});

/* Post Comment */
document.getElementById("commentForm").addEventListener("submit", function(e){
e.preventDefault();

let name = document.getElementById("name").value;
let message = document.getElementById("message").value;

let comment = {name, message};

let comments = JSON.parse(localStorage.getItem("comments")) || [];
comments.push(comment);
localStorage.setItem("comments", JSON.stringify(comments));

displayComment(comment);

document.getElementById("commentForm").reset();
});

/* Display Single Comment */
function displayComment(comment){
let div = document.createElement("div");
div.classList.add("comment");
div.innerHTML = "<strong>" + comment.name + "</strong><br>" + comment.message;
document.getElementById("commentList").appendChild(div);
}

/* Load All Comments */
function loadComments(){
let comments = JSON.parse(localStorage.getItem("comments")) || [];
comments.forEach(displayComment);
}

</script>

</body>
</html>
