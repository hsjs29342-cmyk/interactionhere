<!DOCTYPE html>
<html>
<head>
    <title>KnowShare - Public Knowledge Platform</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        header {
            background: #1e90ff;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
        }

        .container {
            width: 60%;
            margin: 20px auto;
        }

        .post-box {
            background: white;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }

        textarea {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            resize: none;
        }

        button {
            margin-top: 10px;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            background: #1e90ff;
            color: white;
            cursor: pointer;
        }

        .post {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }

        .like-btn {
            background: #ff4757;
        }

        .chat-section {
            position: fixed;
            bottom: 0;
            right: 0;
            width: 300px;
            background: white;
            border: 1px solid #ccc;
        }

        .chat-header {
            background: #1e90ff;
            color: white;
            padding: 10px;
            text-align: center;
        }

        .chat-messages {
            height: 200px;
            overflow-y: auto;
            padding: 10px;
        }

        .chat-input {
            display: flex;
        }

        .chat-input input {
            flex: 1;
            padding: 8px;
            border: none;
            border-top: 1px solid #ccc;
        }

        .chat-input button {
            border-radius: 0;
        }
    </style>
</head>

<body>

<header>KnowShare - Learn & Share Facts</header>

<div class="container">

    <div class="post-box">
        <h3>Create Post</h3>
        <textarea id="postContent" rows="3" placeholder="Share a fact or knowledge..."></textarea>
        <button onclick="addPost()">Post</button>
    </div>

    <div id="posts"></div>

</div>

<div class="chat-section">
    <div class="chat-header">Public Chat</div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input">
        <input type="text" id="chatInput" placeholder="Type message...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>

    function addPost() {
        let content = document.getElementById("postContent").value;
        if(content === "") return;

        let postDiv = document.createElement("div");
        postDiv.className = "post";

        postDiv.innerHTML = `
            <p>${content}</p>
            <button class="like-btn" onclick="likePost(this)">❤️ Like (<span>0</span>)</button>
            <div>
                <input type="text" placeholder="Add comment..." onkeydown="addComment(event, this)">
                <div class="comments"></div>
            </div>
        `;

        document.getElementById("posts").prepend(postDiv);
        document.getElementById("postContent").value = "";
    }

    function likePost(btn) {
        let span = btn.querySelector("span");
        span.innerText = parseInt(span.innerText) + 1;
    }

    function addComment(event, input) {
        if(event.key === "Enter" && input.value !== "") {
            let commentDiv = input.nextElementSibling;
            let p = document.createElement("p");
            p.innerText = input.value;
            commentDiv.appendChild(p);
            input.value = "";
        }
    }

    function sendMessage() {
        let input = document.getElementById("chatInput");
        let message = input.value;
        if(message === "") return;

        let msgDiv = document.createElement("div");
        msgDiv.innerText = message;
        document.getElementById("chatMessages").appendChild(msgDiv);

        input.value = "";
    }

</script>

</body>
</html>
