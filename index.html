<!DOCTYPE html>
<html>
<head>
    <title>KnowShare - Knowledge Platform</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: Arial; background:#f2f2f2; padding:20px; }
        textarea, input { padding:8px; margin:5px 0; width:100%; }
        button { padding:8px 15px; margin:5px 0; }
        .post { background:white; padding:10px; margin-bottom:10px; }
    </style>
</head>
<body>

<h2>KnowShare - Public Knowledge Platform</h2>

<textarea id="postContent" placeholder="Share knowledge..."></textarea>
<button onclick="createPost()">Post</button>

<hr>

<div id="posts"></div>

<hr>

<h3>Live Public Chat</h3>
<input id="chatInput" placeholder="Type message...">
<button onclick="sendMessage()">Send</button>
<div id="chatBox"></div>

<script>
const socket = io();

async function loadPosts() {
    const res = await fetch("/posts");
    const posts = await res.json();
    document.getElementById("posts").innerHTML = "";

    posts.forEach(post => {
        document.getElementById("posts").innerHTML += `
            <div class="post">
                <p>${post.content}</p>
                <button onclick="likePost('${post._id}')">❤️ ${post.likes}</button>
                <input placeholder="Comment" 
                       onkeydown="addComment(event, '${post._id}', this)">
                <div>${post.comments.join("<br>")}</div>
            </div>
        `;
    });
}

async function createPost() {
    const content = document.getElementById("postContent").value;
    if(!content) return;

    await fetch("/posts", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({content})
    });

    document.getElementById("postContent").value = "";
    loadPosts();
}

async function likePost(id) {
    await fetch(`/like/${id}`, {method: "PUT"});
    loadPosts();
}

async function addComment(event, id, input) {
    if(event.key === "Enter" && input.value) {
        await fetch(`/comment/${id}`, {
            method: "PUT",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({comment: input.value})
        });
        input.value = "";
        loadPosts();
    }
}

function sendMessage() {
    const msg = document.getElementById("chatInput").value;
    if(!msg) return;

    socket.emit("chat message", msg);
    document.getElementById("chatInput").value = "";
}

socket.on("chat message", function(msg) {
    document.getElementById("chatBox").innerHTML += `<p>${msg}</p>`;
});

loadPosts();
</script>

</body>
</html>
