<script>
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particlesArray = [];

/* Safe center area (no particles here) */
function isInCenter(x,y){
let centerWidth = canvas.width * 0.5;
let centerHeight = canvas.height * 0.5;

let centerX = canvas.width/2;
let centerY = canvas.height/2;

return (
x > centerX - centerWidth/2 &&
x < centerX + centerWidth/2 &&
y > centerY - centerHeight/2 &&
y < centerY + centerHeight/2
);
}

class Particle{
constructor(){
this.reset();
this.size = Math.random() * 2 + 1;
this.speedX = (Math.random() - 0.5) * 0.6;
this.speedY = (Math.random() - 0.5) * 0.6;
}

reset(){
this.x = Math.random() * canvas.width;
this.y = Math.random() * canvas.height;

/* Keep generating until it's NOT in center */
while(isInCenter(this.x,this.y)){
this.x = Math.random() * canvas.width;
this.y = Math.random() * canvas.height;
}
}

update(){
this.x += this.speedX;
this.y += this.speedY;

if(this.x < 0 || this.x > canvas.width || 
   this.y < 0 || this.y > canvas.height ||
   isInCenter(this.x,this.y)){
this.reset();
}
}

draw(){
ctx.fillStyle = "rgba(255, 80, 80, 0.35)"; /* light red transparent */
ctx.beginPath();
ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
ctx.fill();
}
}

function init(){
particlesArray = [];
for(let i=0;i<120;i++){
particlesArray.push(new Particle());
}
}

function animateParticles(){
ctx.clearRect(0,0,canvas.width,canvas.height);

for(let i=0;i<particlesArray.length;i++){
particlesArray[i].update();
particlesArray[i].draw();
}

requestAnimationFrame(animateParticles);
}

init();
animateParticles();

window.addEventListener("resize",function(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
init();
});
</script>
