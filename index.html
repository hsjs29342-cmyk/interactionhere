<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DV Villain</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    color:white;
    overflow-x:hidden;
}

/* Background Video */
.bg-video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
}

/* Dark overlay */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    z-index:-1;
}

/* Floating particles */
.particle{
    position:absolute;
    width:4px;
    height:4px;
    background:white;
    border-radius:50%;
    animation: float 10s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-10vh);
        opacity:0;
    }
}

/* Header */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
}

/* Logo */
.logo{
    font-size:24px;
    font-weight:bold;
}

/* Navigation */
nav{
    display:flex;
    gap:20px;
}

nav a{
    text-decoration:none;
    color:white;
    padding:8px 15px;
    border-radius:5px;
    transition:0.3s;
}

nav a:hover{
    background:#ff004f;
}

/* Mobile Layout */
@media(max-width:768px){
    header{
        flex-direction:column;
        align-items:flex-start;
    }

    nav{
        width:100%;
        justify-content:space-between;
        margin-top:10px;
    }

    nav a{
        font-size:12px;
        padding:6px 8px;
    }
}

/* Section */
section{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

h1{
    font-size:45px;
}

p{
    margin:20px 0;
    font-size:20px;
}

/* Subscribe Button */
.btn{
    padding:12px 30px;
    background:#ff004f;
    border:none;
    color:white;
    font-size:18px;
    border-radius:30px;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    background:white;
    color:#ff004f;
}
</style>
</head>

<body>

<!-- Background Video -->
<video autoplay muted loop class="bg-video">
    <source src="https://giffiles.alphacoders.com/219/thumb-440-219892.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- Floating Particles -->
<script>
for(let i=0;i<50;i++){
    let particle=document.createElement("div");
    particle.classList.add("particle");
    particle.style.left=Math.random()*100+"%";
    particle.style.animationDuration=(5+Math.random()*5)+"s";
    particle.style.opacity=Math.random();
    document.body.appendChild(particle);
}
</script>

<!-- Header -->
<header>
    <div class="logo">DV Villain</div>
    <nav>
        <a href="#">Home</a>
        <a href="#">About Channel</a>
        <a href="#">Videos</a>
        <a href="#">Community</a>
        <a href="#">Comments</a>
    </nav>
</header>

<!-- Home Section -->
<section>
    <h1>Welcome to DV Villain</h1>
    <p>Gaming • Entertainment • Community</p>
    <button class="btn">Subscribe Now</button>
</section>

</body>
</html>
