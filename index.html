<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Villain Knowledge Hub</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
    scroll-behavior:smooth;
}

body{
    background:#0f0f0f;
    color:white;
    overflow-x:hidden;
}

/* ===== Animated Background Glow ===== */
body::before{
    content:"";
    position:fixed;
    width:600px;
    height:600px;
    background:radial-gradient(circle,#ff000050,transparent);
    top:-200px;
    left:-200px;
    animation:moveGlow 8s infinite alternate;
    z-index:-1;
}

@keyframes moveGlow{
    from{transform:translate(0,0);}
    to{transform:translate(200px,200px);}
}

/* ===== LOGO ===== */
.top-logo{
    position:fixed;
    top:15px;
    left:20px;
    width:70px;
    height:70px;
    border-radius:50%;
    border:3px solid #ff0000;
    box-shadow:0 0 20px #ff0000;
    animation:pulse 2s infinite;
    z-index:1200;
}

@keyframes pulse{
    0%{box-shadow:0 0 10px #ff0000;}
    50%{box-shadow:0 0 30px #ff0000;}
    100%{box-shadow:0 0 10px #ff0000;}
}

/* ===== NAV ===== */
nav{
    position:fixed;
    top:0;
    width:100%;
    background:#181818;
    display:flex;
    justify-content:center;
    padding:20px 0;
    border-bottom:2px solid #ff0000;
    z-index:1000;
}

nav a{
    color:white;
    margin:0 35px;
    text-decoration:none;
    font-weight:600;
    transition:0.3s;
}

nav a:hover{
    color:#ff0000;
    transform:scale(1.1);
}

/* ===== SECTION ANIMATION ===== */
section{
    opacity:0;
    transform:translateY(50px);
    animation:fadeIn 1s forwards;
}

@keyframes fadeIn{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* ===== HOME ===== */
.home-section{
    min-height:100vh;
    display:flex;
    align-items:center;
    padding-top:120px;
}

.home-container{
    width:85%;
    margin:auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.home-left, .home-right{
    width:48%;
}

.home-left h1{
    font-size:48px;
    color:#ff0000;
    margin-bottom:20px;
    text-shadow:0 0 15px #ff0000;
}

.home-left p{
    color:#ccc;
    margin-bottom:25px;
    line-height:1.7;
}

/* ===== BUTTONS ===== */
.btn{
    display:inline-block;
    padding:12px 30px;
    margin:10px 10px 0 0;
    border-radius:30px;
    text-decoration:none;
    font-weight:bold;
    background:#ff0000;
    color:white;
    transition:0.3s;
}

.btn:hover{
    background:#cc0000;
    transform:scale(1.08);
    box-shadow:0 0 20px #ff0000;
}

/* ===== COMMUNITY CARD ===== */
.home-right{
    background:#181818;
    padding:40px;
    border-radius:15px;
    border:1px solid #ff0000;
    box-shadow:0 0 20px #ff000050;
    text-align:center;
}

.home-right h2{
    margin-bottom:20px;
    color:#ff0000;
}

/* ===== ABOUT ===== */
#about{
    padding:120px 10%;
    background:#121212;
    text-align:center;
}

#about h2{
    color:#ff0000;
    margin-bottom:20px;
}

/* ===== VIDEOS ===== */
#videos{
    padding:120px 5%;
    background:#0f0f0f;
    text-align:center;
}

#videos h2{
    color:#ff0000;
    margin-bottom:40px;
}

.video-grid{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:35px;
}

.video-grid iframe{
    width:360px;
    height:210px;
    border-radius:10px;
    border:2px solid #ff0000;
    transition:0.3s;
}

.video-grid iframe:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px #ff0000;
}

/* ===== RESPONSIVE ===== */
@media(max-width:900px){
    .home-container{
        flex-direction:column;
        text-align:center;
    }
    .home-left, .home-right{
        width:100%;
        margin-bottom:40px;
    }
    .video-grid iframe{
        width:95%;
    }
}

</style>
</head>

<body>

<img src="logo.png" class="top-logo">

<nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#videos">Videos</a>
</nav>

<section id="home" class="home-section">
    <div class="home-container">

        <div class="home-left">
            <h1>Welcome to Villain Knowledge Hub</h1>
            <p>Powerful knowledge. Strong mindset. Real growth.</p>

            <a href="YOUR_CHANNEL_LINK" class="btn" target="_blank">Subscribe</a>
            <a href="YOUR_INSTAGRAM_LINK" class="btn" target="_blank">Instagram</a>
        </div>

        <div class="home-right">
            <h2>Join Community</h2>
            <a href="YOUR_TELEGRAM_LINK" class="btn" target="_blank">Telegram</a>
            <a href="YOUR_WHATSAPP_LINK" class="btn" target="_blank">WhatsApp</a>
            <a href="mailto:YOUREMAIL@gmail.com" class="btn">Contact</a>
        </div>

    </div>
</section>

<section id="about">
    <h2>About Channel</h2>
    <p>Villain Knowledge Hub helps students grow with mindset, facts, and clarity.</p>
</section>

<section id="videos">
    <h2>Latest Videos</h2>
    <div class="video-grid">
        <iframe src="https://www.youtube.com/embed/tRBX0P2wlSM" allowfullscreen></iframe>
        <iframe src="https://www.youtube.com/embed/lRXVOeGQXQs" allowfullscreen></iframe>
        <iframe src="https://www.youtube.com/embed/dQJgvOXFbHU" allowfullscreen></iframe>
    </div>
</section>

</body>
</html>
