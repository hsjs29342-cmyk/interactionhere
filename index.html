<section id="comments" style="padding-bottom: 40px;">
        <h2 style="font-size: 2.5rem; margin-bottom: 20px; color: red;">FEEDBACK</h2>
        
        <div style="width: 100%; max-width: 650px;">
            <textarea id="commentInput" rows="4" placeholder="Share your suggestions..." style="width:100%; padding:15px; border-radius:4px; background:#111; color:white; border:1px solid #444; resize:none; font-size: 16px; outline: none;"></textarea>
            <button class="btn" onclick="addComment()" style="margin-top:20px; width:100%;">Post Comment</button>
        </div>

        <div id="comments-list" style="width: 100%; max-width: 650px; margin-top: 30px; text-align: left; min-height: 50px;"></div>

        <div style="margin-top: 80px; border-top: 1px solid rgba(255,0,0,0.3); width: 100%; max-width: 800px; padding-top: 30px;">
            <p style="color: #888; font-size: 14px; letter-spacing: 1px;">
                &copy; 2026 <span style="color: red; font-weight: bold;">DV VILLAIN YT</span> | ALL RIGHTS RESERVED
            </p>
            <a href="#home" style="color: #555; text-decoration: none; font-size: 12px; display: inline-block; margin-top: 10px; text-transform: uppercase;">Back to top ↑</a>
        </div>
    </section>

    <script>
        function addComment(){
            const input = document.getElementById("commentInput");
            const text = input.value.trim();
            if(text === "") return;
            
            const div = document.createElement("div");
            div.style.background = "rgba(40, 40, 40, 0.8)";
            div.style.margin = "15px 0";
            div.style.padding = "20px";
            div.style.borderRadius = "8px";
            div.style.borderLeft = "5px solid red";
            div.style.transition = "0.5s";
            div.innerText = text;
            
            document.getElementById("comments-list").prepend(div);
            input.value = "";
        }
    </script>
